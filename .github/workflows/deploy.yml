name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Set up the Flutter/Dart environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 2. Install the Jaspr CLI globally on the runner
      - name: Install Jaspr CLI
        run: dart pub global activate jaspr_cli

      # 3. Fetch your project dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 4. Build the static Jaspr application
      - name: Build Jaspr App
        run: jaspr build

      # 5. Deploy the build/jaspr/web directory to Firebase
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZEUSCAJ_PORTFOLIO }}
          channelId: live
          projectId: zeuscaj-portfolio